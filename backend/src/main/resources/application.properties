# Server Configuration
server.port=8081
spring.application.name=jira-chatbot-enterprise

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:jirachatbot
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=VermegJiraChatbotSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=86400000

# AI Configuration (OpenAI - Optional)
openai.api.key=YOUR_OPENAI_API_KEY_HERE
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model=gpt-3.5-turbo

# CORS Configuration
cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Logging
logging.level.com.vermeg.jirachatbot=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
